name: Release

# Per the app-release-conventions: test → package → attach to a DRAFT release.
# CI stays minimal — the packaging complexity lives in electron-builder.yml and
# the `dist` npm script. Nothing is published automatically; a draft is created
# for the pushed tag, verified, then published by hand (gh release edit --draft=false).
#
# Two triggers:
#   - push a tag `v*` -> build every platform, attach installers + portables to a
#     single draft release for that tag.
#   - manual dispatch -> build only (no release), for a smoke check.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Gate: a failing test suite means no release is built.
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build:
    needs: test
    strategy:
      fail-fast: false # a Windows failure never cancels the macOS build
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci

      # One command: electron-vite build + electron-builder for the host OS.
      # electron-builder targets the current platform, so macOS makes the .dmg +
      # portable .zip, and Windows the setup.exe + portable .zip (into release/).
      # --publish never (in the script) means it builds but uploads nothing here.
      # CSC_IDENTITY_AUTO_DISCOVERY=false only blocks real-cert discovery; the ad-hoc
      # bundle seal comes from the mac `identity: "-"` in the builder config.
      - name: Package (host OS)
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Attach only the real artifacts to the draft. The globs deliberately omit
      # electron-builder's auto-update byproducts (latest*.yml, *.blockmap), so
      # the release stays to the installers + portables until auto-update exists.
      # zipkit's electron-builder output dir is release/ (not dist/).
      - name: Attach to draft release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: true
          prerelease: true # 0.x is pre-release
          # Body renders from the pushed tag (${{ github.ref_name }}), so the note
          # never goes stale on a version bump — no release-specific text baked in.
          body: |
            **ZipKit ${{ github.ref_name }}**

            These builds are unsigned, so the OS warns on first launch:
            - **macOS**: right-click the app → **Open** (or `xattr -dr com.apple.quarantine ZipKit.app`)
            - **Windows**: SmartScreen → **More info** → **Run anyway**
          files: |
            release/*.dmg
            release/*.exe
            release/*.zip
