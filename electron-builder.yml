appId: io.github.nao7sep.zipkit
productName: ZipKit

# Packaged installers land in release/ — kept clear of tsup's dist/ (the CLI build)
# and electron-vite's out/ (the app bundle this packages). Icons and other build
# resources are read from build/.
directories:
  output: release
  buildResources: build

# Ship only the built app bundle (electron-vite's out/). Prod dependencies and
# package.json are included automatically; source, tests, and tsup's dist/ are not.
files:
  - out/**
  - "!**/*.map"

mac:
  category: public.app-category.utilities
  target:
    - dmg
    - zip

win:
  target:
    - nsis
