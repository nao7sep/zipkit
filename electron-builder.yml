appId: io.github.nao7sep.zipkit
productName: ZipKit

# Packaged installers land in release/ — kept clear of electron-vite's out/ (the
# app bundle this packages). Icons and other build resources are read from build/.
directories:
  output: release
  buildResources: build

# Ship only the built app bundle (electron-vite's out/). Prod dependencies and
# package.json are included automatically; source and tests are not.
files:
  - out/**
  - "!**/*.map"

# Tahoe "Liquid Glass" icon: ship the pre-compiled asset catalog (committed in
# company/assets, deployed here by the liquid-glass-icon tool) into Contents/Resources.
# macOS 26 reads CFBundleIconName below → this catalog; older macOS falls back to
# CFBundleIconFile → build/icon.icns (mac.icon). Building does NOT need Xcode — the
# Assets.car is prebuilt; only re-generating the icon does.
extraResources:
  - from: build/Assets.car
    to: Assets.car

mac:
  category: public.app-category.utilities
  icon: build/icon.icns
  extendInfo:
    CFBundleIconName: zipper-z-olive
  # Pin arm64 explicitly so the macOS artifact's architecture is deterministic,
  # not inherited from whatever the build host/runner happens to be.
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64

win:
  icon: build/icon.ico
  target:
    - nsis
